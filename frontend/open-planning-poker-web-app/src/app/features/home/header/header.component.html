<header class="header-wrapper">
  <div class="header">
    <mat-toolbar>
      <!-- Hamburger menu -->
      <button mat-icon-button [matMenuTriggerFor]="moreMenu" matTooltip="Menu" aria-label="Menu">
        <mat-icon>menu</mat-icon>
      </button>

      <span class="header-brand">Open Planning Poker</span>
      <span class="header-spacer"></span>

      <!-- Username -->
      <span class="header-welcome" *ngIf="username" (click)="handleUpdateUser()" role="button" tabindex="0" matTooltip="Edit username">
        {{ username }}
        <button
          mat-icon-button
          class="header-edit-btn"
          (click)="$event.stopPropagation(); handleUpdateUser()"
          aria-label="Edit username">
          <mat-icon>edit</mat-icon>
        </button>
      </span>

      <mat-menu #moreMenu="matMenu">
        <button mat-menu-item (click)="toggleTheme()">
          <mat-icon>{{ isDark ? 'light_mode' : 'dark_mode' }}</mat-icon>
          <span>{{ isDark ? 'Light mode' : 'Dark mode' }}</span>
        </button>
        <mat-divider></mat-divider>
        <a mat-menu-item href="{{githubRepoUrl}}" target="_blank" rel="noopener noreferrer">
          <mat-icon svgIcon="github"></mat-icon>
          <span>GitHub</span>
        </a>
        <a mat-menu-item href="{{websiteUrl}}" target="_blank" rel="noopener noreferrer">
          <mat-icon>language</mat-icon>
          <span>Website</span>
        </a>
        <button mat-menu-item (click)="openInfoDialog()">
          <mat-icon>info</mat-icon>
          <span>About</span>
        </button>
      </mat-menu>
    </mat-toolbar>
  </div>
</header>
