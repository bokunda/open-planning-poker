<main class="home-wrapper">
  <h1 class="sr-only">Open Planning Poker — Free Agile Estimation Tool</h1>
  <div class="home">
    <app-header [username]="username"></app-header>
    <app-breadcrumb [items]="breadcrumbItems"></app-breadcrumb>
    <div ngSkipHydration>
      @defer (when userExists()) {
        <app-game class="center" style="width:100%" [currentUserId]="userId" [currentUserName]="username"></app-game>
      } @placeholder {
        <app-loading message="Preparing game..."></app-loading>
      }
    </div>
    <app-footer></app-footer>
  </div>
</main>
