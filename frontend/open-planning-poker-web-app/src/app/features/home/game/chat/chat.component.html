<div class="chat-wrapper" [class.chat-wrapper--collapsed]="collapsed">
  <div class="chat-header" (click)="collapsedChange.emit(!collapsed)" role="button" tabindex="0" aria-label="Toggle chat panel">
    <span>Game Chat</span>
    <button mat-icon-button class="chat-toggle-btn" (click)="$event.stopPropagation(); collapsedChange.emit(!collapsed)" aria-label="Toggle chat">
      <mat-icon>{{ collapsed ? 'expand_more' : 'expand_less' }}</mat-icon>
    </button>
  </div>

  <div class="chat-panel" *ngIf="!collapsed">
    <div class="chat-messages">
      <div class="chat-empty" *ngIf="messages.length === 0">
        No messages yet. Say hello!
      </div>
      <div class="chat-msg" *ngFor="let msg of messages; let i = index"
        [class.chat-msg-own]="msg.playerName === currentUserName">
        <span class="chat-msg-author">{{ msg.playerName }}</span>
        <span class="chat-msg-text" [innerHTML]="linkify(msg.content)"></span>
        <span class="chat-msg-time">{{ msg.timestamp | date:'HH:mm' }}</span>
      </div>
    </div>

    <div class="chat-input">
      <input
        type="text"
        [(ngModel)]="newMessage"
        (keydown)="onKeyEnter($event)"
        placeholder="Type a message..."
        maxlength="500"
        aria-label="Chat message input"
      />
      <button mat-icon-button color="primary" (click)="sendMessage()"
        [disabled]="!newMessage.trim()"
        aria-label="Send message">
        <mat-icon>send</mat-icon>
      </button>
    </div>
  </div>
</div>
