<div class="players-panel">
  <!-- Header -->
  <div class="players-header" (click)="collapsedChange.emit(!collapsed)" role="button" tabindex="0" aria-label="Toggle players panel">
    <span class="players-title">Players</span>
    <span class="players-consensus" *ngIf="!collapsed && consensusLabel">{{ consensusLabel }}</span>
    <button mat-icon-button class="players-toggle" (click)="$event.stopPropagation(); collapsedChange.emit(!collapsed)" aria-label="Toggle players">
      <mat-icon>{{ collapsed ? 'expand_more' : 'expand_less' }}</mat-icon>
    </button>
  </div>

  <ng-container *ngIf="!collapsed">
    <!-- Player list -->
    <div class="players-list" *ngIf="players?.items">
      <div class="player-row" *ngFor="let player of players?.items; trackBy: trackByPlayerId"
        [class.player-row--me]="player.id === currentUserId">
        <div class="player-avatar" [class.player-avatar--voted]="getVoteData(player.id)">
          {{ player.name?.charAt(0) || '?' }}
        </div>
        <span class="player-name">{{ player.name }}</span>
        <span class="player-vote" [class.player-vote--hidden]="!votesRevealed && getVoteData(player.id)">
          {{ getVoteDisplay(player.id) }}
        </span>
      </div>
    </div>

    <div class="players-empty" *ngIf="!players?.items?.length">
      Waiting for players to join...
    </div>
  </ng-container>
</div>
