<div class="create-game-wrapper">
  <div class="create-game">
    <form [formGroup]="createGameForm" (ngSubmit)="onSubmit()" (keydown.enter)="$event.preventDefault(); onSubmit()" class="create-game-form">
      <mat-form-field appearance="outline">
        <mat-label>Game Name</mat-label>
        <input matInput formControlName="name" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Voting Deck</mat-label>
        <mat-select formControlName="deckSetup">
          <mat-option *ngFor="let deck of deckPresets" [value]="deck.value">
            <span class="deck-option-label">{{ deck.label }}</span>
            <span class="deck-option-example">— {{ deck.example }}</span>
          </mat-option>
          <mat-option value="__custom__">Custom Deck...</mat-option>
        </mat-select>
      </mat-form-field>

      <!-- Custom deck editor -->
      <ng-container *ngIf="isCustomDeck">
        <mat-form-field appearance="outline">
          <mat-label>Custom Deck Values (comma-separated)</mat-label>
          <input matInput formControlName="customDeck" placeholder="1,2,3,5,8,13,?,☕" />
        </mat-form-field>
        <div class="custom-deck-preview" *ngIf="customDeckPreview.length > 0">
          <span class="preview-label">Preview:</span>
          <span class="preview-card" *ngFor="let card of customDeckPreview">{{ card }}</span>
        </div>
      </ng-container>

      <mat-form-field appearance="outline">
        <mat-label>Description</mat-label>
        <textarea matInput formControlName="description"></textarea>
      </mat-form-field>

      <button mat-fab extended type="submit">
        Create
        <mat-icon>sports_esports</mat-icon>
      </button>
    </form>
  </div>
</div>
