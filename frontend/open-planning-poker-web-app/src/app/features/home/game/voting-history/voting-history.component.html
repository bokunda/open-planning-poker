<div class="voting-history-wrapper">
  <div class="voting-history" *ngIf="tickets && tickets.length > 0">
    <h3>History</h3>
    <mat-accordion>
      <mat-expansion-panel *ngFor="let ticket of tickets; trackBy: trackByTicketId" [expanded]="ticket.id === currentTicketId">
        <mat-expansion-panel-header>
          <mat-panel-title class="history-title">
            <span class="history-title-text">{{ticket.name}}</span>
            <span class="ticket-chip" *ngIf="ticket.id === currentTicketId">Active</span>
          </mat-panel-title>
          <mat-panel-description class="history-avg">
            AVG:
            <ng-container *ngIf="ticket.id !== currentTicketId || votesRevealed; else hiddenAvg">
              {{ticket.averageVotingValue}}
            </ng-container>
            <ng-template #hiddenAvg>?</ng-template>
          </mat-panel-description>
        </mat-expansion-panel-header>
        <p class="ticket-desc" *ngIf="ticket.description">{{ ticket.description }}</p>
        <div *ngIf="ticket?.votes?.items && ticket!.votes!.totalCount > 0; else noItems">
          <p>Voting result history.</p>
          <span *ngFor="let vote of ticket?.votes?.items; trackBy: trackByVoteId">
            <p><strong>{{vote.playerName}}:</strong>
              <ng-container *ngIf="ticket.id !== currentTicketId || votesRevealed; else hiddenVote">
                {{vote.value}}
              </ng-container>
              <ng-template #hiddenVote>?</ng-template>
            </p>
          </span>
          <div class="ticket-actions" *ngIf="isHost && ticket.id !== currentTicketId">
            <button mat-stroked-button color="primary" (click)="onReVoteTicket.emit(ticket.id)">
              <mat-icon>replay</mat-icon> Re-vote this ticket
            </button>
          </div>
        </div>
      </mat-expansion-panel>
    </mat-accordion>
  </div>
</div>

<ng-template #noItems><p>No voting results for the ticket.</p></ng-template>
