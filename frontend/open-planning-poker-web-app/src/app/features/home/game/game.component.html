<main class="game-wrapper" id="main-content">
  <div class="game">
    <div class="center">
      <app-options
        [inGame]="!game"
        (onCreateGameClick)="handleCreateGame()"
        (onJoinGameClick)="handleJoinGame()"
        (onLeaveGameClick)="handleLeaveGame()">
      </app-options>
    </div>
    <app-loading *ngIf="isLoading" message="Loading game..."></app-loading>
    <div class="game-details" *ngIf="game">
      <div class="center">
        <app-game-details
          [game]="game"
          (onLeaveGameClick)="handleLeaveGame()"
          (onGameReportClick)="handleGameReport()"></app-game-details>
      </div>

      <div class="center">
        <app-voting
          [players]="players"
          [gameSettings]="game.settingsDetails"
          [ticket]="ticket"
          [votes]="votes"
          [votesRevealed]="votesRevealed"
          [isHost]="isHost"
          (onCreateNewTicket)="handleCreateTicket()"
          (OnVote)="handleVoteAction($event)"
          (onRevealVotes)="handleRevealVotes()"
          (onVoteAgain)="handleVoteAgain()"
          ></app-voting>
      </div>

      <div class="center">
        <div class="full-width" >
          <app-voting-history
            [tickets]="tickets"
            [votesRevealed]="votesRevealed"
            [currentTicketId]="ticket?.id"
          ></app-voting-history>
        </div>
      </div>
    </div>
  </div>
  <app-chat [gameId]="game?.id ?? ''" [currentUserId]="currentUserId"></app-chat>
</main>
