<main class="game-wrapper" id="main-content">
  <!-- Landing (no game) -->
  <ng-container *ngIf="!game">
    <div class="game-landing">
      <app-options
        [inGame]="!game"
        (onCreateGameClick)="handleCreateGame()"
        (onJoinGameClick)="handleJoinGame()"
        (onLeaveGameClick)="handleLeaveGame()">
      </app-options>
    </div>
  </ng-container>

  <app-loading *ngIf="isLoading" message="Loading game..."></app-loading>

  <!-- Game active: dashboard layout -->
  <div class="game-dashboard" *ngIf="game">
    <!-- Main column -->
    <div class="game-main">
      <app-game-details
        [game]="game"
        [isHost]="isHost"
        (onLeaveGameClick)="handleLeaveGame()"
        (onGameReportClick)="handleGameReport()"
        (onCreateNewTicket)="handleCreateTicket()"></app-game-details>

      <app-voting
        [players]="players"
        [gameSettings]="game.settingsDetails"
        [ticket]="ticket"
        [tickets]="tickets"
        [votes]="votes"
        [votesRevealed]="votesRevealed"
        [isHost]="isHost"
        (onCreateNewTicket)="handleCreateTicket()"
        (OnVote)="handleVoteAction($event)"
        (onRevealVotes)="handleRevealVotes()"
        (onVoteAgain)="handleVoteAgain()"
        (onNavigateTicket)="handleReVoteTicket($event)"
        ></app-voting>

      <app-voting-history
        [tickets]="tickets"
        [votesRevealed]="votesRevealed"
        [currentTicketId]="ticket?.id"
        [isHost]="isHost"
        (onReVoteTicket)="handleReVoteTicket($event)"
      ></app-voting-history>
    </div>

    <!-- Sidebar -->
    <aside class="game-sidebar">
      <app-players
        [players]="players"
        [votes]="votes"
        [votesRevealed]="votesRevealed"
        [isHost]="isHost"
        [currentUserId]="currentUserId"
        [(collapsed)]="playersCollapsed"
        (onRevealCards)="handleRevealVotes()"
        (onVoteAgain)="handleVoteAgain()"
        (onCreateNewTicket)="handleCreateTicket()">
      </app-players>

      <app-chat
        [gameId]="game.id"
        [currentUserId]="currentUserId"
        [(collapsed)]="chatCollapsed">
      </app-chat>
    </aside>
  </div>
</main>
