<main class="game-wrapper" id="main-content">
  <!-- Landing (no game) -->
  <ng-container *ngIf="!game">
    <div class="game-landing" @fadeSlide>
      <div class="hero-cta">
        <div class="hero-illustration">🎯</div>
        <h2 class="hero-title">Ready to plan?</h2>
        <p class="hero-desc">Create a game room and invite your team to start estimating.</p>
        <div class="hero-actions">
          <button mat-raised-button color="primary" class="hero-btn hero-btn--primary" (click)="handleCreateGame()">
            <mat-icon>add</mat-icon> Create Game
          </button>
          <button mat-stroked-button color="primary" class="hero-btn" (click)="handleJoinGame()">
            <mat-icon>login</mat-icon> Join Game
          </button>
        </div>
      </div>
    </div>
  </ng-container>

  <app-loading *ngIf="isLoading" @fadeIn message="Loading game..."></app-loading>

  <!-- Game active: dashboard layout -->
  <div class="game-dashboard" *ngIf="game" @fadeSlide>
    <!-- Main column -->
    <div class="game-main">
      <app-game-details
        [game]="game"
        [isHost]="isHost"
        (onLeaveGameClick)="handleLeaveGame()"
        (onGameReportClick)="handleGameReport()"
        (onCreateNewTicket)="handleCreateTicket()"></app-game-details>

      <app-voting
        [players]="players"
        [gameSettings]="game.settingsDetails"
        [ticket]="ticket"
        [tickets]="tickets"
        [votes]="votes"
        [votesRevealed]="votesRevealed"
        [isHost]="isHost"
        (onCreateNewTicket)="handleCreateTicket()"
        (onImportTickets)="handleImportTickets()"
        (OnVote)="handleVoteAction($event)"
        (onRevealVotes)="handleRevealVotes()"
        (onVoteAgain)="handleVoteAgain()"
        (onNavigateTicket)="handleReVoteTicket($event)"
        ></app-voting>

      <app-voting-history
        [tickets]="tickets"
        [votesRevealed]="votesRevealed"
        [currentTicketId]="ticket?.id"
        [isHost]="isHost"
        (onReVoteTicket)="handleReVoteTicket($event)"
      ></app-voting-history>
    </div>

    <!-- Sidebar -->
    <aside class="game-sidebar">
      <app-players
        [players]="players"
        [votes]="votes"
        [votesRevealed]="votesRevealed"
        [isHost]="isHost"
        [currentUserId]="currentUserId"
        [(collapsed)]="playersCollapsed"
        (onRevealCards)="handleRevealVotes()"
        (onVoteAgain)="handleVoteAgain()"
        (onCreateNewTicket)="handleCreateTicket()">
      </app-players>

      <app-chat
        [gameId]="game.id"
        [currentUserId]="currentUserId"
        [currentUserName]="currentUserName"
        [(collapsed)]="chatCollapsed">
      </app-chat>
    </aside>
  </div>
</main>
