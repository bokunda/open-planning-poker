<section class="voting-wrapper" aria-label="Voting area">
  <div class="voting">
    <div class="voting-item-details">
      <h2 class="center">{{ticket?.name}}</h2>
      <p class="center">Average voting value:
        <strong class="voting-item-value" *ngIf="votesRevealed">{{ ticket?.averageVotingValue }}</strong>
        <strong class="voting-item-value vote-hidden" *ngIf="!votesRevealed && ticket?.averageVotingValue">?</strong>
      </p>
    </div>
  </div>

  <div class="voting-players-wrapper">
    <div class="voting-players-wrapper center">
      <app-players
        [players]="players"
        [votes]="votes"
        [votesRevealed]="votesRevealed"
        [isHost]="isHost"
        (onRevealCards)="onRevealVotes.emit()"
        (onVoteAgain)="onVoteAgain.emit()"
        (onCreateNewTicket)="handleOnCreateNewTicket()">
      </app-players>
    </div>
  </div>

  <div class="voting-options-wrapper">
    <!-- Timer -->
    <div class="timer-wrapper center" *ngIf="isHost && !votesRevealed">
      <span class="timer-display" [class.timer-warning]="timerWarning">
        ⏱ {{ timerDisplay }}
      </span>
      <div class="timer-controls">
        <button mat-icon-button color="primary" *ngIf="!timerRunning" (click)="startTimer()" aria-label="Start timer">
          <mat-icon>play_arrow</mat-icon>
        </button>
        <button mat-icon-button color="warn" *ngIf="timerRunning" (click)="stopTimer()" aria-label="Stop timer">
          <mat-icon>stop</mat-icon>
        </button>
        <button mat-icon-button (click)="resetTimer()" aria-label="Reset timer">
          <mat-icon>restart_alt</mat-icon>
        </button>
      </div>
    </div>

    <div class="voting-item-options">
      <button *ngFor="let voteOption of voteOptions; trackBy: trackByOption"
        mat-raised-button
        color="primary"
        class="card-button"
        [disabled]="ticket?.id == null"
        [ngClass]="{'selected': selectedOption === voteOption}"
        (click)="selectOption(voteOption)">
        {{ voteOption }}
      </button>
    </div>
  </div>
</section>
